{% extends "base.html" %}
{% block pre_app_scripts %}
  <script src="{{ url_for('static', path='js/config-workbench.js') }}"></script>
{% endblock %}
{% block content %}
<div class="config-shell" data-page="config">
  <section class="card config-hero">
    <div class="config-hero-copy">
      <span class="badge">System Settings</span>
      <h1 class="config-hero-title">配置修改</h1>
      <p class="config-hero-text">
        全局设置与容器设置分离管理。左侧容器列表适合多容器场景；右侧只编辑当前容器，减少长表单滚动与误操作。
      </p>
    </div>
    <div class="config-summary-grid">
      <div class="config-summary-card">
        <div class="config-summary-label">配置版本</div>
        <div class="config-summary-value" id="cfg-version-badge">-</div>
      </div>
      <div class="config-summary-card">
        <div class="config-summary-label">容器数量</div>
        <div class="config-summary-value" id="cfg-container-count">-</div>
      </div>
      <div class="config-summary-card">
        <div class="config-summary-label">未保存项</div>
        <div class="config-summary-value" id="cfg-dirty-count">-</div>
      </div>
    </div>
  </section>

  <section class="card config-toolbar">
    <div class="config-toolbar-main">
      <div class="config-tabs" role="tablist" aria-label="配置页面标签">
        <button id="cfg-tab-containers" class="config-tab is-active" type="button" data-tab="containers">容器设置</button>
        <button id="cfg-tab-global" class="config-tab" type="button" data-tab="global">全局设置</button>
      </div>
      <div class="config-toolbar-status">
        <div class="config-status-line" id="cfg-status">准备就绪</div>
        <div class="helper" id="cfg-last-saved">尚未保存</div>
      </div>
    </div>
    <div class="config-toolbar-actions">
      <button id="cfg-load" class="btn btn-secondary" type="button">重新加载</button>
      <button id="cfg-save" class="btn btn-primary" type="button">保存当前内容</button>
    </div>
  </section>

  <div class="config-grid" id="cfg-grid">
    <aside class="card config-sidebar" id="cfg-sidebar"></aside>
    <section class="config-stage" id="cfg-stage"></section>
  </div>
</div>

<div id="cfg-dialog" class="dialog-mask hidden" aria-hidden="true">
  <div class="card dialog-panel">
    <div class="dialog-title" id="cfg-dialog-title">确认操作</div>
    <div class="text-sm text-slate-600" id="cfg-dialog-message"></div>
    <div class="dialog-actions" id="cfg-dialog-actions"></div>
  </div>
</div>
{% endblock %}
