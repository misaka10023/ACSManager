# ACS Manager 多容器配置示例（含中文注释）

config_version: 2                      # 配置文件版本，版本变更时自动迁移

# 全局 ACS 配置：所有容器共享，可在容器级 acs 字段中覆盖 container_name/service_type
acs:
  base_url: "http://192.168.10.200:6080"  # ACS 控制台基础地址（含协议和端口）
  api_prefix: "/sothisai"                 # ACS API 前缀，默认 /sothisai
  login_user: "your-acs-username"         # ACS 登录用户名
  login_password: "change-me"             # ACS 登录密码（生产请修改）
  user_type: "os"                         # 登录用户类型，如 os/gridview
  public_key: ""                          # 登录密码加密用的 Base64 公钥
  verify_ssl: false                       # 自签证书可设为 false 关闭校验
  cookies:                                # 预置 cookies；非空时优先复用
    JSESSIONID: ""
    GV_JSESSIONID: ""

containers:
  - name: "default"                       # 唯一标识 + 展示名称
    acs:
      container_name: "default"          # ACS 任务列表中的容器/任务名称
      service_type: "container"          # container|notebook；notebook 使用 /api/notebook/task 系列接口
      notebook_id: ""                    # notebook 记录 ID；建议通过 Web UI 任务下拉自动填写
    restart:
      strategy: "restart"                # restart|recreate|none
    ssh:
      mode: "jump"                       # direct|jump|double SSH 模式
      bastion_host: ""                   # 跳板/远端服务 IP（direct 可留空）
      bastion_user: ""                   # 跳板登录用户（direct 可留空）
      target_user: "root"                # 容器宿主机登录用户
      port: 22                           # 外层 SSH 端口
      container_port: 22                 # 内层 SSH 端口（double 模式使用）
      password_login: false              # true 使用密码，false 使用密钥
      password: ""                       # 密码登录的密码
      # strict_host_key_checking: accept-new   # yes|no|accept-new|ask；ask 在守护进程中无 TTY 不可用
      # user_known_hosts_file: ""              # 留空时 yes/accept-new/ask 都走 ~/.ssh/known_hosts；仅 strict_host_key_checking=no 走空设备。daemon 模式不要用 ask（无 TTY 会阻塞）。
      remote_dynamic_forwards: []        # 远端动态 SOCKS (-R)，如 {"bind":"127.0.0.1","remote":17890}
      forwards: []                       # 正向转发列表 (-L)，如 {"local": 8080, "remote": 80}
      reverse_forwards: []               # 反向转发列表 (-R)，支持 {"local":8080,"remote":80,"mid":58080}
      container_ip: ""                   # 可选兜底 IP；自动解析失败时可先手填，后续新 IP 会写回
    tasks: []                            # 容器任务列表；支持 auto_on_start/manual、screen/tmux/nohup/shell

